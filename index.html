<style>
:root{
  --slate:#4C565F; --slate-d:#3C444B; --slate-l:#8FA0AE;
  --blue:#19417E; --amber:#FBB513; --orange:#D96C32;
  --ink:#2C333A; --mut:#6B747C; --line:#E4E7EA; --bg:#F4F6F7; --card:#FFFFFF;
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100dvh}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px;min-height:100dvh;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.top img{height:34px;width:auto;display:block}
.tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:600}
.chev{display:flex;gap:4px;margin:0 0 16px}
.chev span{flex:1;height:5px;background:var(--line);clip-path:polygon(0 0,100% 0,calc(100% - 5px) 100%,5px 100%)}
.chev span.on{background:var(--blue)}
.chev span.on.e{background:var(--orange)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 18px;flex:1;display:flex;flex-direction:column}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px}
.g-menage{color:var(--slate-l)} .g-energie{color:var(--orange)} .g-eau{color:var(--blue)}
.g-deplacements{color:var(--slate)} .g-conso{color:var(--amber)}
.qcount{font-size:12px;color:var(--mut);font-weight:600;margin-bottom:8px}
.qtext{font-size:21px;font-weight:700;line-height:1.25;letter-spacing:-.01em;color:var(--slate-d);margin:0 0 18px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{appearance:none;width:100%;text-align:left;font-family:inherit;font-size:16px;font-weight:500;color:var(--ink);
  background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:15px 16px;cursor:pointer;
  display:flex;align-items:center;gap:12px;transition:border-color .12s,background .12s,transform .05s}
.opt:hover{border-color:var(--slate)}
.opt:active{transform:scale(.99)}
.opt:focus-visible{outline:3px solid rgba(25,65,126,.35);outline-offset:1px}
.opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none}
.opt.sel{border-color:var(--blue);background:#F2F6FB}
.opt.sel .dot{border-color:var(--blue);background:var(--blue);box-shadow:inset 0 0 0 3px #fff}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.back{appearance:none;background:none;border:none;color:var(--mut);font:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:8px 4px;visibility:hidden}
.back.show{visibility:visible}
.hint{font-size:13px;color:var(--mut)}

/* results */
.res{display:flex;flex-direction:column;gap:14px}
.rhead h2{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--slate-d);margin:0 0 4px}
.rhead p{margin:0;color:var(--mut);font-size:14px}
.hero{border:1px solid var(--line);border-radius:12px;padding:16px;background:linear-gradient(180deg,#fff, #FAFBFC)}
.hero .lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
.hero .big{font-size:44px;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--slate-d);margin:4px 0 2px}
.hero .big small{font-size:18px;font-weight:700;color:var(--mut)}
.hero .sub{font-size:13.5px;color:var(--slate)}
.scale{margin-top:24px}
.track{position:relative;height:12px;border-radius:7px;background:#ECEFF1;overflow:visible}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:7px;background:linear-gradient(90deg,var(--orange),#E0883B)}
.mark{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--slate-d)}
.mark b{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--slate-d);white-space:nowrap}
.mark.lo b{left:0;transform:none}
.mark.hi b{right:0;left:auto;transform:none}
.scalelbl{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:13px}

.break{border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.break .h{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:10px}
.stack{display:flex;height:22px;border-radius:6px;overflow:hidden}
.stack i{display:block}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:11px}
.legend span{font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px}
.legend span b{width:10px;height:10px;border-radius:3px;display:inline-block}

.metric{border-radius:12px;border:1px solid var(--line);overflow:hidden}
.metric .bar{height:6px}
.metric .body{padding:14px 16px}
.metric .lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
.metric .val{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin:3px 0 2px}
.metric .unit{font-size:15px;font-weight:600;color:var(--mut)}
.metric .eq{font-size:13.5px;color:var(--slate);margin-top:6px}
.m-en .bar{background:var(--orange)} .m-en .val{color:var(--orange)}
.m-eau .bar{background:var(--blue)} .m-eau .val{color:var(--blue)}

.lever{background:#FFF8EC;border:1.5px solid var(--amber);border-radius:12px;padding:15px 16px}
.lever .k{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9A6B00;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.lever .k svg{width:15px;height:15px}
.lever h3{margin:0 0 5px;font-size:16.5px;font-weight:700;color:var(--slate-d)}
.lever p{margin:0;font-size:14.5px;color:#4a4a4a}
.lever p+p{margin-top:7px}
.foot{font-size:12.5px;color:var(--mut);line-height:1.5}
.utopie{border-top:1px solid var(--line);margin-top:6px;padding-top:14px}
.utopie .h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:6px}
.utopie p{margin:0;font-size:13.5px;color:var(--ink);line-height:1.55}
.restart{appearance:none;width:100%;margin-top:4px;font:inherit;font-size:15px;font-weight:600;color:#fff;background:var(--slate);border:none;border-radius:12px;padding:14px;cursor:pointer}
.restart:active{transform:scale(.99)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.fade{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>

   <div class="opts"><button class="opt " data-v="0"><span class="dot"></span><span>Je vis seul·e</span></button><button class="opt " data-v="1"><span class="dot"></span><span>Deux</span></button><button class="opt " data-v="2"><span class="dot"></span><span>Trois ou quatre</span></button><button class="opt " data-v="3"><span class="dot"></span><span>Cinq ou plus</span></button></div>

<script>
const Q = [
 {id:'menage',g:'menage',gl:'Votre ménage',q:"Vous êtes combien à la maison&nbsp;?",
  o:[["Je vis seul·e",1],["Deux",2],["Trois ou quatre",3.5],["Cinq ou plus",5]]},
 {id:'logement',g:'menage',gl:'Votre ménage',q:"Vous habitez plutôt&nbsp;:",
  o:[["Un appartement","appt"],["Une maison","maison"]]},
 {id:'chauffage',g:'energie',gl:'Énergie du logement',q:"Comment chauffez-vous votre logement&nbsp;?",
  o:[["Au mazout","mazout"],["Au gaz","gaz"],["Pompe à chaleur","pac"],["Chauffage électrique","elec"],["Bois ou chauffage à distance","renouv"],["Je ne sais pas","inconnu"]]},
 {id:'iso',g:'energie',gl:'Énergie du logement',q:"Et l'isolation, c'est plutôt&nbsp;:",
  o:[["Récent ou rénové, bien isolé",0.7],["Dans la moyenne",1.0],["Ancien, ça chauffe dehors",1.45],["Aucune idée",1.1]]},
 {id:'solaire',g:'energie',gl:'Énergie du logement',q:"Des panneaux solaires sur le toit&nbsp;?",
  o:[["Oui","oui"],["Non, mais le toit s'y prêterait","possible"],["Non, ou je suis en location","non"]]},
 {id:'elecsobr',g:'energie',gl:'Énergie du logement',q:"Côté électricité, vous diriez&nbsp;:",
  o:[["J'y fais attention (LED, pas de veilles)",0.85],["Comme tout le monde",1.0],["Je n'y pense pas vraiment",1.2]]},
 {id:'eau',g:'eau',gl:'Votre eau',q:"Vos habitudes d'eau chaude&nbsp;?",
  o:[["Surtout des douches courtes",0.8],["Des douches plutôt longues",1.3],["Des bains réguliers",1.7]]},
 {id:'exterieur',g:'eau',gl:'Votre eau',q:"À l'extérieur, vous avez&nbsp;:",
  o:[["Ni jardin ni piscine",0],["Un jardin arrosé l'été",40],["Une piscine","pool"]]},
 {id:'voiture',g:'deplacements',gl:'Vos déplacements',q:"Votre voiture principale&nbsp;:",
  o:[["Je n'ai pas de voiture","none"],["Essence ou diesel","therm"],["Hybride","hyb"],["Électrique","elec"]]},
 {id:'km',g:'deplacements',gl:'Vos déplacements',q:"Vous roulez combien par an, environ&nbsp;?",
  o:[["Moins de 5 000 km",3000],["Entre 5 000 et 15 000 km",10000],["Plus de 15 000 km",20000]]},
 {id:'avion',g:'deplacements',gl:'Vos déplacements',q:"L'avion, sur une année dans le foyer&nbsp;?",
  o:[["Aucun vol",0],["Un ou deux vols courts",700],["Un long-courrier ou plus",3000],["On voyage beaucoup",6000]]},
 {id:'diet',g:'conso',gl:'Votre consommation',q:"La viande rouge, à table&nbsp;?",
  o:[["Rarement ou jamais",1400],["Quelques fois par semaine",2100],["Presque tous les jours",2900]]},
 {id:'achats',g:'conso',gl:'Votre consommation',q:"Vos achats (vêtements, objets, high-tech)&nbsp;:",
  o:[["Je limite et je répare",1500],["Dans la moyenne",2600],["J'aime le neuf et je renouvelle souvent",4000]]},
 {id:'subv',g:'menage',gl:'Pour finir',q:"Saviez-vous que la Ville subventionne ces travaux&nbsp;?",
  o:[["Oui, je connais les aides","oui"],["Non, pas vraiment","non"]]},
];

let A={}, step=0;
const card=document.getElementById('card'), chev=document.getElementById('chev');
function visible(){ return Q.filter(q => q.id!=='km' || A.voiture!=='none'); }
function drawChev(){
  const vis=visible();
  chev.innerHTML = vis.map((q,i)=>`<span class="${i<step?'on':''} ${i<step&&i%2?'e':''}"></span>`).join('');
}
function render(){
  const vis=visible();
  if(step>=vis.length) return results();
  const it=vis[step]; drawChev(); card.className='card fade';
  card.innerHTML=`
   <div class="eyebrow g-${it.g}">${it.gl}</div>
   <div class="qcount">Question ${step+1} sur ${vis.length}</div>
   <h2 class="qtext">${it.q}</h2>
   <div class="opts">${it.o.map((o,i)=>`<button class="opt ${A[it.id]===o[1]?'sel':''}" data-v="${i}"><span class="dot"></span><span>${o[0]}</span></button>`).join('')}</div>
   <div class="nav"><button class="back ${step>0?'show':''}" id="back">&larr; Retour</button><span class="hint">Touchez une réponse</span></div>`;
  card.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{A[it.id]=it.o[+b.dataset.v][1];step++;render();});
  const bk=document.getElementById('back'); if(bk) bk.onclick=()=>{if(step>0){step--;render();}};
}
function r(n,d=0){const f=Math.pow(10,d);return Math.round(n*f)/f;}
function fmt(n){return r(n).toLocaleString('fr-CH');}

function compute(){
  const m=A.menage||2;
  const baseT=(A.logement==='maison'?16000:7000)*(A.iso||1);
  const thermal=baseT + 750*m*(A.eau||1);          // demande thermique du ménage
  const efElec=(A.solaire==='oui'?0.09:0.17);       // mix Nyon: standard 0.181, vert/solaire 0.045
  let co2HeatHH,enHeat;
  switch(A.chauffage){
    case 'mazout':co2HeatHH=thermal*0.308;enHeat=thermal/0.80;break;
    case 'gaz':co2HeatHH=thermal*0.271;enHeat=thermal/0.90;break;
    case 'pac':enHeat=thermal/3.4;co2HeatHH=enHeat*efElec;break;
    case 'elec':enHeat=thermal;co2HeatHH=thermal*efElec;break;
    case 'renouv':co2HeatHH=thermal*0.10;enHeat=thermal;break;   // bois propre, mais CAD nyonnais = 80% mazout
    default:co2HeatHH=thermal*0.27;enHeat=thermal/0.85;
  }
  const elecHH=1500*m*(A.elecsobr||1);
  const co2ElecHH=elecHH*efElec;
  const enHome=enHeat+elecHH;
  // par personne : chaleur et électricité du logement se partagent dans le ménage
  const heatPP=co2HeatHH/m, elecPP=co2ElecHH/m;
  // mobilité, alimentation, achats : propres à la personne qui répond
  const carF=A.voiture==='therm'?0.20:A.voiture==='hyb'?0.15:A.voiture==='elec'?0.08:0;
  const km=A.voiture==='none'?0:(A.km||0);
  const carPP=km*carF, flyPP=A.avion||0;
  const alimPP=A.diet||2100, goodsPP=A.achats||2600, incPP=2500;
  const totalPP=heatPP+elecPP+carPP+flyPP+alimPP+goodsPP+incPP;
  const showerPP=A.eau===0.8?35:A.eau===1.3?75:110;
  const ext=A.exterieur==='pool'?180:(A.exterieur||0);
  const water=(95+showerPP)*m+ext;
  return {m, enHome, water, heatPP, elecPP, carPP, flyPP, alimPP, goodsPP, incPP,
    energiePP:heatPP+elecPP, depPP:carPP+flyPP, consoPP:alimPP+goodsPP, totalPP};
}
function leverText(c){
  const fossile=(A.chauffage==='mazout'||A.chauffage==='gaz'||A.chauffage==='renouv'||A.chauffage==='inconnu');
  const mob=c.carPP+c.flyPP;
  const subvLine="La Ville de Nyon et les SI subventionnent ces travaux (pompe à chaleur, isolation, fenêtres, solaire).";
  let title,body,extra="";
  if(A.chauffage==='mazout'||A.chauffage==='gaz'||A.chauffage==='inconnu'){
    title="Votre chauffage, en priorité";
    body="C'est un poste énergie important, et il est encore fossile. Passer à une pompe à chaleur le réduit fortement. "+subvLine;
  } else if(A.chauffage==='renouv'){
    title="Attention au chauffage à distance";
    body="Le bois est propre, mais le chauffage à distance nyonnais reste composé à 80&nbsp;% de mazout. Si c'est votre cas, une pompe à chaleur ou l'isolation gardent tout leur intérêt. "+subvLine;
  } else if(A.solaire==='possible'){
    title="Votre toit pourrait produire";
    body="Votre chauffage est déjà propre. L'étape suivante, c'est le solaire sur votre toit. "+subvLine;
  } else if(A.iso===1.45){
    title="L'isolation, votre prochain pas";
    body="Votre logement chauffe encore beaucoup vers l'extérieur. Mieux l'isoler réduit la facture et les émissions. "+subvLine;
  } else {
    title="Déjà sobre côté énergie";
    if(A.avion>=3000) body="Côté énergie, rien à redire. Votre plus gros levier restant est ailleurs\u00A0: espacer les vols long-courriers, qui pèsent lourd dans n'importe quelle empreinte.";
    else if(mob>0) body="Côté énergie, vous êtes au point. Le levier qui reste relève de la mobilité\u00A0: le train et le vélo sur les courts trajets, ou l'électrique.";
    else body="Rien ne ressort, côté énergie comme ailleurs. Continuez ainsi.";
  }
  if(A.subv==='non' && !/subventionn/.test(body)) extra="Au passage, puisque vous ne les connaissiez pas\u00A0: les SI Nyon et la Ville aident financièrement pompe à chaleur, isolation, fenêtres et solaire. Passez nous voir.";
  else if(A.eau===1.7) extra="Côté eau, alterner bain et douche allège facture, eau et énergie de chauffe.";
  return {title,body,extra};
}
function countUp(el,target,dec){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){el.textContent=(dec?r(target,dec):fmt(target)).toLocaleString('fr-CH');return;}
  const t0=performance.now(),dur=800;
  (function fr(t){const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);
    el.textContent=dec?r(target*e,dec).toLocaleString('fr-CH'):fmt(target*e);if(p<1)requestAnimationFrame(fr);})(t0);
}
function results(){
  const c=compute();
  chev.innerHTML=Q.map((_,i)=>`<span class="on ${i%2?'e':''}"></span>`).join('');
  const lv=leverText(c);
  const L=n=>n.toLocaleString('fr-CH');
  const m=c.m;
  const totPP=c.totalPP/1000;
  const totT=r(totPP,1);
  const incT=r(c.incPP/1000,1);
  const planetes=r(totPP/5,1);
  const NYON=13.6, OBJ=1.5;
  const scale=Math.max(totPP,NYON)*1.12;
  const fillPct=Math.min(100,totPP/scale*100);
  const nyP=NYON/scale*100, objP=OBJ/scale*100;
  const charbon=r(c.enHome/8.14);
  const bains=r(c.water/150);
  const ppEau=r(c.water/c.m);
  const parts=[['Énergie',c.energiePP,'#FBB513'],['Déplacements',c.depPP,'#4C565F'],['Alimentation, achats',c.consoPP,'#D96C32'],['Incompressible',c.incPP,'#8FA0AE']];
  const tot=c.totalPP||1;
  const segs=parts.map(p=>`<i style="width:${Math.max(0,p[1]/tot*100)}%;background:${p[2]}"></i>`).join('');
  const leg=parts.map(p=>`<span><b style="background:${p[2]}"></b>${p[0]} ${L(r(p[1]/1000,1))}&nbsp;t</span>`).join('');

  card.className='card fade';
  card.innerHTML=`
  <div class="res">
    <div class="rhead"><h2>Votre empreinte</h2><p>Une estimation rapide, pour ouvrir la discussion.</p></div>

    <div class="hero">
      <div class="lbl">Empreinte carbone totale</div>
      <div class="big"><span id="vtot">0</span> <small>tonnes de CO₂ par personne et par an</small></div>
      <div class="sub">🌍 Si toute l'humanité vivait comme vous, il faudrait environ <b>${L(planetes)} planètes</b>.</div>
      <div class="scale">
        <div class="track">
          <div class="fill" style="width:${fillPct}%"></div>
          <div class="mark lo" style="left:${objP}%"><b>Objectif 2050 ~1–2&nbsp;t</b></div>
          <div class="mark hi" style="left:${nyP}%"><b>Nyon 13,6 (2022)</b></div>
        </div>
        <div class="scalelbl"><span>Limite planétaire&nbsp;: 0,6&nbsp;t (OFEV)</span><span>t&nbsp;/&nbsp;personne</span></div>
      </div>
    </div>

    <div class="break">
      <div class="h">D'où vient votre empreinte</div>
      <div class="stack">${segs}</div>
      <div class="legend">${leg}</div>
      <div style="margin-top:10px;color:var(--slate);font-size:13px">L'énergie et l'eau forment le domaine des SI Nyon. La part incompressible (environ ${L(incT)}&nbsp;t) regroupe services publics, santé, construction et infrastructures, que personne ne réduit seul.</div>
    </div>

    <div class="lever">
      <div class="k"><svg viewBox="0 0 24 24" fill="none" stroke="#9A6B00" stroke-width="2"><path d="M12 2v6m0 0 3-3m-3 3L9 5M5 12h14l-2 9H7z"/></svg>Votre levier n°1</div>
      <h3>${lv.title}</h3><p>${lv.body}</p>${lv.extra?`<p>${lv.extra}</p>`:''}
    </div>

    <div class="metric m-en"><div class="bar"></div><div class="body">
      <div class="lbl">Énergie du logement</div>
      <div class="val"><span id="ven">0</span> <span class="unit">kWh par an</span></div>
      <div class="eq">L'équivalent d'environ ${fmt(charbon)} kg de charbon brûlés.</div></div></div>

    <div class="metric m-eau"><div class="bar"></div><div class="body">
      <div class="lbl">Votre eau</div>
      <div class="val"><span id="veau">0</span> <span class="unit">litres par jour</span></div>
      <div class="eq">Soit ${fmt(ppEau)} litres par personne, environ ${fmt(bains)} baignoires. Distribuée par les SI Nyon.</div></div></div>

    <div class="utopie">
      <div class="h">Et l'horizon&nbsp;? La société à 2000 watts</div>
      <p>Même en faisant tout juste, difficile de descendre seul sous 4 à 5&nbsp;tonnes aujourd'hui&nbsp;: le reste dépend de choix collectifs. L'objectif suisse pour 2050 vise environ 1 à 2&nbsp;tonnes par personne. Plus loin encore, la société à 2000&nbsp;watts, née à l'EPF de Zurich, imagine un mode de vie autour de 1&nbsp;tonne de CO₂&nbsp;: un horizon ambitieux, qui suppose autant de décisions collectives que de gestes individuels.</p>
    </div>

    <p class="foot">Les SI Nyon vous fournissent l'électricité, le gaz, la chaleur et l'eau, et subventionnent les travaux qui les réduisent. À noter&nbsp;: dans le bilan officiel, l'électricité standard est comptée au mix suisse (181&nbsp;g CO₂/kWh)&nbsp;; choisir un produit vert qui finance de nouvelles installations la fait tomber à 45&nbsp;g. La moyenne nyonnaise est de 13,6&nbsp;t par habitant·e (2022), l'objectif suisse pour 2050 d'environ 1 à 2&nbsp;t (la limite planétaire stricte étant même inférieure à 0,6&nbsp;t, OFEV). Calcul basé sur le bilan carbone 2022 de la Ville de Nyon. Estimation indicative.</p>
    <button class="restart" id="rs">Recommencer</button>
  </div>`;
  countUp(document.getElementById('vtot'),totT,1);
  countUp(document.getElementById('ven'),r(c.enHome),0);
  countUp(document.getElementById('veau'),r(c.water),0);
  document.getElementById('rs').onclick=()=>{A={};step=0;render();};
}
render();
</script>


</body></html>
